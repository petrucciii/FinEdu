<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinEdu - Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <!-- stesso navbar -->
    </nav>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="Education.html">Educazione</a></li>
                <li class="breadcrumb-item"><a href="ModuleDetail.html?id=2">Investimenti e Mercati Azionari</a></li>
                <li class="breadcrumb-item active">Concetti di base: azioni e obbligazioni</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h3>Quiz: Concetti di base</h3>
                    <p class="text-muted">Rispondi alle seguenti domande. Ogni risposta corretta ti farà guadagnare esperienza.</p>

                    <form id="quizForm">
                        <!-- Domanda 1 -->
                        <div class="mb-4">
                            <label class="fw-bold">1. Cosa rappresenta un'azione?</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="q1" value="0" id="q1a1">
                                <label class="form-check-label" for="q1a1">Un prestito alla società</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="q1" value="1" id="q1a2">
                                <label class="form-check-label" for="q1a2">Una quota di proprietà</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="q1" value="0" id="q1a3">
                                <label class="form-check-label" for="q1a3">Un titolo di debito</label>
                            </div>
                        </div>

                       

                        <button type="button" class="btn btn-primary">Invia risposta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white pt-5 pb-4 mt-5">
        <!-- invariato -->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
